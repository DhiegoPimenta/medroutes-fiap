name: Build, Test e Deploy MedRoutes

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: rg-medroutes
  AZURE_LOCATION: eastus2
  ACR_IMAGE_NAME: medroutes

jobs:
  test:
    name: Rodar testes pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar Poetry e dependencias
        run: |
          pip install poetry
          poetry install --no-root

      - name: Rodar pytest
        run: poetry run pytest tests/ -v

  deploy:
    name: Deploy no Azure Container Apps
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Login no Azure
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Obter nome do ACR
        id: acr
        run: |
          ACR_NAME=$(az acr list --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query "[0].name" -o tsv)
          LOGIN_SERVER=$(az acr show --name $ACR_NAME --query "loginServer" -o tsv)
          echo "acr_name=$ACR_NAME" >> "$GITHUB_OUTPUT"
          echo "login_server=$LOGIN_SERVER" >> "$GITHUB_OUTPUT"

      - name: Login no ACR via Docker
        run: |
          az acr update --name ${{ steps.acr.outputs.acr_name }} --admin-enabled true
          ACR_PASSWORD=$(az acr credential show --name ${{ steps.acr.outputs.acr_name }} --query "passwords[0].value" -o tsv)
          echo $ACR_PASSWORD | docker login ${{ steps.acr.outputs.login_server }} \
            --username ${{ steps.acr.outputs.acr_name }} --password-stdin

      - name: Build e push da imagem Docker
        run: |
          docker build -t ${{ steps.acr.outputs.login_server }}/${{ env.ACR_IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ steps.acr.outputs.login_server }}/${{ env.ACR_IMAGE_NAME }}:${{ github.sha }} \
                     ${{ steps.acr.outputs.login_server }}/${{ env.ACR_IMAGE_NAME }}:latest
          docker push ${{ steps.acr.outputs.login_server }}/${{ env.ACR_IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ steps.acr.outputs.login_server }}/${{ env.ACR_IMAGE_NAME }}:latest

      - name: Desabilitar admin ACR
        if: always()
        run: az acr update --name ${{ steps.acr.outputs.acr_name }} --admin-enabled false

      - name: Instalar extensao containerapp
        run: az extension add --name containerapp --upgrade -y

      - name: Atualizar Container App com imagem real
        run: |
          az containerapp update \
            --name ca-medroutes \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ steps.acr.outputs.login_server }}/${{ env.ACR_IMAGE_NAME }}:${{ github.sha }}
