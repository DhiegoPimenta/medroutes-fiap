name: Build, Test e Deploy MedRoutes

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: rg-medroutes
  AZURE_LOCATION: brazilsouth
  ACR_IMAGE_NAME: medroutes

jobs:
  test:
    name: Rodar testes pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar Poetry e dependencias
        run: |
          pip install poetry
          poetry install --no-root

      - name: Rodar pytest
        run: poetry run pytest tests/ -v

  deploy:
    name: Deploy no Azure Container Apps
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Login no Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validar infraestrutura (what-if)
        run: |
          az deployment sub what-if \
            --name medroutes-ci-${{ github.run_number }} \
            --location ${{ env.AZURE_LOCATION }} \
            --template-file infra/main.bicep \
            --parameters environmentName=medroutes location=${{ env.AZURE_LOCATION }} resourceGroupName=${{ env.AZURE_RESOURCE_GROUP }}

      - name: Aplicar infraestrutura (Bicep)
        run: |
          az deployment sub create \
            --name medroutes-ci-${{ github.run_number }} \
            --location ${{ env.AZURE_LOCATION }} \
            --template-file infra/main.bicep \
            --parameters environmentName=medroutes location=${{ env.AZURE_LOCATION }} resourceGroupName=${{ env.AZURE_RESOURCE_GROUP }} anthropicApiKey=${{ secrets.ANTHROPIC_API_KEY }}

      - name: Obter login server do ACR
        id: acr
        run: |
          LOGIN_SERVER=$(az deployment sub show --name medroutes-ci-${{ github.run_number }} --query "properties.outputs.containerRegistryLoginServer.value" -o tsv)
          echo "login_server=$LOGIN_SERVER" >> "$GITHUB_OUTPUT"

      - name: Build e push da imagem (sem chaves de admin, via az acr build)
        run: |
          az acr build \
            --registry ${{ steps.acr.outputs.login_server }} \
            --image ${{ env.ACR_IMAGE_NAME }}:${{ github.sha }} \
            --image ${{ env.ACR_IMAGE_NAME }}:latest \
            .

      - name: Atualizar Container App
        run: |
          az containerapp update \
            --name ca-medroutes \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ steps.acr.outputs.login_server }}/${{ env.ACR_IMAGE_NAME }}:${{ github.sha }}
